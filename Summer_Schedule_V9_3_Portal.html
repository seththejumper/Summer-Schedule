function init(){people.slice().sort().forEach(p=>{person.innerHTML+=`<option>${esc(p)}</option>`}); dateOrder.forEach(d=>{todayDate.innerHTML+=`<option value="${d}">${dates[d].label}</option>`}); personWeek.innerHTML='<option value="all">Entire Schedule</option>'; weeks.forEach(w=>{weekSel.innerHTML+=`<option value="${w.index}">${w.label}</option>`; personWeek.innerHTML+=`<option value="${w.index}">${w.label}</option>`}); [...new Set(dateOrder.map(d=>d.slice(0,7)))].forEach(m=>{let dt=new Date(m+'-01T00:00:00'); monthSel.innerHTML+=`<option value="${m}">${dt.toLocaleString(undefined,{month:'long',year:'numeric'})}</option>`}); [todayDate].forEach(sel=>{let i=[...sel.options].findIndex(o=>o.value===APP.defaultDate); if(i>=0) sel.selectedIndex=i}); [weekSel,personWeek].forEach(sel=>{let i=[...sel.options].findIndex(o=>Number(o.value)===APP.defaultWeek); if(i>=0) sel.selectedIndex=i})}
function renderLegend(){legend.innerHTML=Object.entries(colors).sort().map(([a,c])=>`<span class="pill" style="${style(c)}">${esc(a)}</span>`).join('')}
function renderDay(selId,boxId){let d=document.getElementById(selId).value, g=groups(d); let entries=Object.entries(g).filter(([a,l])=>a!=='Unavailable' && a!=='Off' && l.some(isRealShift)); document.getElementById(boxId).innerHTML=entries.sort().map(([a,l])=>`<div class="group" onclick="openShift('${d}','${esc(a)}')"><div class="groupHead" style="${style(colors[a]||l[0].color)}"><span>${esc(a)}</span><span>${l.length}</span></div><div class="people">${l.map(x=>pill(x.person,x)).join('')}</div></div>`).join('')||'<div class="help">No work assignments found for this date.</div>'}
function renderPerson(){
  let p=document.getElementById('person')?.value;
  if(!p){ personSched.innerHTML='<div class="help">Select a person.</div>'; return; }

  let weekValue=document.getElementById('personWeek')?.value || 'all';
  let f=(document.getElementById('personFilter')?.value||'').toLowerCase();
  let ds;
  if(weekValue==='all'){
    ds=dateOrder.slice();
    if(document.getElementById('personSchedTitle')) personSchedTitle.textContent='Entire Schedule';
  }else{
    let start=Number(weekValue||0);
    ds=dateOrder.slice(start,start+7);
    let selected=document.getElementById('personWeek')?.selectedOptions?.[0]?.textContent || 'Selected Week';
    if(document.getElementById('personSchedTitle')) personSchedTitle.textContent=selected;
  }
  let visibleDates=new Set(ds);

  let items=(schedule[p]||[])
    .filter(i=>visibleDates.has(i.date))
    .filter(isRealShift)
    .sort((a,b)=>dateOrder.indexOf(a.date)-dateOrder.indexOf(b.date));

  if(f){
    items=items.filter(i=>
      i.assignments.join(' ').toLowerCase().includes(f) ||
      String(i.label||'').toLowerCase().includes(f) ||
      String(i.day||'').toLowerCase().includes(f)
    );
  }

  personSched.innerHTML=items.map(i=>`
    <div class="card" style="${style(i.color)}" onclick="openShift('${i.date}','${esc(i.assignments[0])}','${esc(p)}')">
      <div class="title">
        <span>${i.assignments.map(esc).join(' + ')}${speakLabel(i.speaking)}${i.assignments.length>1?' <span class="badge">MULTI</span>':''}</span>
        <span>${i.assignments.map(a=>team(i.date,a).length).join('/')}</span>
      </div>
      <div class="meta">${esc(i.label)} · ${esc(i.day)}</div>
    </div>
  `).join('') || `<div class="help">No working shifts for this person in the selected ${weekValue==='all'?'schedule':'week'}.</div>`;
}

function renderWeek(){let start=Number(weekSel.value||0), ds=dateOrder.slice(start,start+7); let h='<div class="wrap"><table><tr><th>Person</th>'+ds.map(d=>`<th>${dates[d].label}</th>`).join('')+'</tr>'; people.slice().sort().forEach(p=>{h+=`<tr><td><b>${esc(p)}</b></td>`; ds.forEach(d=>{let i=dates[d]?.people[p]; h+='<td>'+(i?i.assignments.map(a=>`<div class="cell" style="${style(colors[a]||i.color)}" onclick="openShift('${d}','${esc(a)}','${esc(p)}')">${esc(a)}${speakLabel(i.speaking)}</div>`).join(''):'')+'</td>'}); h+='</tr>'}); weekBox.innerHTML=h+'</table></div>'}
function renderCal(){let m=monthSel.value, ds=dateOrder.filter(d=>d.startsWith(m)); calBox.innerHTML='<div class="calendar">'+ds.map(d=>{let g=groups(d); return `<div class="day"><b>${dates[d].label}</b>`+Object.entries(g).slice(0,4).map(([a,l])=>`<div class="mini" style="${style(colors[a]||l[0].color)}" onclick="openShift('${d}','${esc(a)}')">${esc(a)} · ${l.length}</div>`).join('')+'</div>'}).join('')+'</div>'}
function renderStats(){let h='<div class="wrap"><table><tr><th>Person</th><th>Scheduled Work Days</th><th>Half Speaking</th><th>Full Speaking</th><th>Multi-show Days</th><th>Show Counts</th></tr>'; people.slice().sort().forEach(p=>{let s=appStats(p), counts=Object.entries(s.assignments).sort((a,b)=>b[1]-a[1]).map(([a,n])=>`${esc(a)}: ${n}`).join('<br>'); h+=`<tr><td><b>${esc(p)}</b></td><td>${s.scheduledDays}</td><td>${s.halfSpeaking}</td><td>${s.fullSpeaking}</td><td>${s.multiShowDays}</td><td>${counts}</td></tr>`}); statsBox.innerHTML=h+'</table></div>'}
init(); renderDay('todayDate','todayBox'); renderPerson(); renderWeek(); renderCal(); renderStats();
todayDate.addEventListener('change',()=>renderDay('todayDate','todayBox')); person.addEventListener('change',renderPerson); personWeek.addEventListener('change',renderPerson); personFilter.addEventListener('input',renderPerson); weekSel.addEventListener('change',renderWeek); monthSel.addEventListener('change',renderCal);
</script></body></html>
